name: Release

# Build standalone binaries for Windows, macOS, and Linux and attach them to a
# GitHub Release whenever a vX.Y.Z tag is pushed.
#
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: backtowork-windows-x86_64.exe
            bin: dist/backtowork.exe
            extra_install: ".[toast]"
            extra_args: "--collect-all winotify"
          - os: macos-latest
            asset_name: backtowork-macos-arm64
            bin: dist/backtowork
            extra_install: "."
            extra_args: ""
          - os: ubuntu-latest
            asset_name: backtowork-linux-x86_64
            bin: dist/backtowork
            extra_install: "."
            extra_args: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ matrix.extra_install }}"
          python -m pip install pyinstaller pytest

      - name: Run tests
        run: pytest -q

      - name: Build standalone binary
        run: >
          pyinstaller --onefile --name backtowork
          --collect-data backtowork
          ${{ matrix.extra_args }}
          pyinstaller_entry.py

      - name: Smoke-test the binary
        shell: bash
        run: |
          "${{ matrix.bin }}" --version

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.bin }}" "out/${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: out/${{ matrix.asset_name }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
