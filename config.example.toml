# Back To Work config — copy to backtowork.toml (next to where you run it) and edit.
# Or place it at %APPDATA%\backtowork\config.toml (Windows) /
# ~/.config/backtowork/config.toml.  You can also skip config entirely:
#   backtowork watch --reset 3h

[settings]
idle_interval = 60     # seconds between polls while credit is available
fast_interval = 10     # seconds between polls right around a known reset
play_sound    = true   # play a sound when credit comes back
show_toast    = true   # show a desktop toast (needs the `toast` extra on Windows)
# sound       = "C:/path/to/your.wav"   # override the bundled chime

# --- Claude Code (zero-cost, local exact marker) -----------------------------
# Reads Claude Code's own session transcripts under ~/.claude/projects and looks
# for the explicit usage-limit marker written by the CLI. Never calls the
# Anthropic API. Recent activity alone is not treated as exhausted.
[[provider]]
kind = "claude_code"
name = "claude"
# lookback_hours = 6

# --- Codex (zero-cost, local, exact when available) --------------------------
# The OpenAI Codex CLI caches the server's own rate-limit snapshot into its
# session logs under ~/.codex/sessions (override with $CODEX_HOME). We read it
# locally — never calling any model API. Current Codex builds write `resets_at`;
# older builds wrote `resets_in_seconds`. Some builds log it as null until the
# server sends one; then this returns "unknown" and you can fall back to manual.
# [[provider]]
# kind = "codex"
# name = "codex"
# window            = "primary"   # "primary" (~5h) or "secondary" (weekly)
# threshold_percent = 95          # treat the window as exhausted at/above this
# max_age_days      = 14

# --- Manual countdown (exact, zero-guessing) ---------------------------------
# Best when you know exactly when you regain access (e.g. the CLI told you).
# [[provider]]
# kind = "manual"
# name = "claude"
# reset_at = "3h"          # relative, or an ISO time: 2026-05-30T18:00:00Z

# --- Generic probe (works with ANY coder) ------------------------------------
# Wrap whatever check you do in a script following the exit-code convention:
#   exit 0 -> credit available     exit 75 -> out of credit / rate-limited
# Optionally print `reset_at=<ISO8601>` on stdout for smart sleeping.
# [[provider]]
# kind = "command"
# name = "my-coder"
# command = "./probe.sh"
# timeout = 20
